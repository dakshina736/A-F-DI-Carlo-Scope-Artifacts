<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toronto Snow Fleet Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #0d1117;
      --panel:  #161b22;
      --border: #30363d;
      --accent: #e36b2d;
      --green:  #3fb950;
      --yellow: #d29922;
      --red:    #f85149;
      --blue:   #58a6ff;
      --text:   #e6edf3;
      --muted:  #8b949e;
      --mono:   'IBM Plex Mono', monospace;
      --sans:   'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 320px 1fr;
      grid-template-areas: "header header" "sidebar map";
      overflow: hidden;
    }

    /* HEADER */
    #header {
      grid-area: header;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 14px; z-index: 9999;
    }
    #header .logo { font-size: 1.5rem; }
    #header h1 {
      font-family: var(--mono); font-size: .9rem;
      font-weight: 700; letter-spacing: 2px;
      color: var(--accent); text-transform: uppercase;
    }
    #header .sub { font-size: .68rem; color: var(--muted); letter-spacing: 1px; margin-left: 4px; }
    .live-badge {
      margin-left: auto; display: flex; align-items: center;
      gap: 7px; font-family: var(--mono); font-size: .68rem;
      color: var(--green); letter-spacing: 1px;
    }
    .live-dot {
      width:8px; height:8px; border-radius:50%; background:var(--green);
      animation: livepulse 1.4s infinite;
    }
    @keyframes livepulse {
      0%,100%{ opacity:1; box-shadow:0 0 0 0 rgba(63,185,80,.6); }
      50%    { opacity:.5; box-shadow:0 0 0 5px rgba(63,185,80,0); }
    }
    #poll-timer { font-family:var(--mono); font-size:.65rem; color:var(--muted); margin-left:16px; }

    /* SIDEBAR */
    #sidebar {
      grid-area: sidebar; background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-head { padding:14px 16px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .sidebar-head h2 { font-family:var(--mono); font-size:.72rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
    .fleet-stats { display:flex; gap:10px; margin-top:10px; }
    .fstat { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px 10px; text-align:center; }
    .fstat .val { font-family:var(--mono); font-size:1.1rem; font-weight:700; }
    .fstat .lbl { font-size:.58rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
    .fstat.available .val { color:var(--green); }
    .fstat.busy      .val { color:var(--yellow); }
    .fstat.full      .val { color:var(--red); }

    #truck-list { flex:1; overflow-y:auto; padding:8px; }
    #truck-list::-webkit-scrollbar { width:4px; }
    #truck-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    .truck-card {
      background:var(--bg); border:1px solid var(--border); border-radius:8px;
      padding:10px 12px; margin-bottom:6px; cursor:pointer;
      transition:border-color .15s, background .15s;
      display:flex; align-items:center; gap:10px;
    }
    .truck-card:hover  { border-color:var(--accent); }
    .truck-card.active { border-color:var(--accent); background:#1c1f24; }
    .truck-avatar { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .truck-info { flex:1; min-width:0; }
    .truck-id { font-family:var(--mono); font-size:.78rem; font-weight:700; color:var(--text); }
    .truck-street { font-size:.65rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
    .truck-right { text-align:right; flex-shrink:0; }
    .speed-val { font-family:var(--mono); font-size:.85rem; font-weight:600; color:var(--blue); }
    .speed-unit { font-size:.55rem; color:var(--muted); }
    .status-pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.58rem; font-weight:600; letter-spacing:.5px; text-transform:uppercase; margin-top:4px; }
    .pill-available { background:rgba(63,185,80,.15);  color:var(--green); }
    .pill-busy      { background:rgba(210,153,34,.15); color:var(--yellow); }
    .pill-full      { background:rgba(248,81,73,.15);  color:var(--red); }

    /* MAP */
    #map { grid-area:map; }

    /* Loading overlay */
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(13,17,23,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999; gap: 16px;
    }
    #loading-overlay h2 { font-family:var(--mono); font-size:1rem; color:var(--accent); letter-spacing:2px; }
    #loading-bar-wrap { width:320px; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    #loading-bar { height:100%; background:var(--accent); width:0%; transition:width .3s; border-radius:3px; }
    #loading-status { font-family:var(--mono); font-size:.7rem; color:var(--muted); letter-spacing:1px; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background:var(--panel) !important; border:1px solid var(--border) !important;
      border-radius:10px !important; box-shadow:0 8px 32px rgba(0,0,0,.6) !important;
      color:var(--text) !important; padding:0 !important;
    }
    .leaflet-popup-tip { background:var(--panel) !important; }
    .leaflet-popup-content { margin:0 !important; }
    .popup-inner { padding:14px 16px; min-width:200px; }
    .popup-header { display:flex; align-items:center; gap:10px; padding-bottom:10px; border-bottom:1px solid var(--border); margin-bottom:10px; }
    .popup-icon { font-size:1.6rem; }
    .popup-id { font-family:var(--mono); font-size:.9rem; font-weight:700; }
    .popup-rows { display:flex; flex-direction:column; gap:6px; }
    .popup-row { display:flex; justify-content:space-between; align-items:center; font-size:.72rem; }
    .popup-label { color:var(--muted); letter-spacing:.5px; }
    .popup-value { font-family:var(--mono); font-weight:600; color:var(--text); }
    .popup-value.spd { color:var(--blue); }

    /* Truck marker */
    .truck-marker-wrap { display:flex; flex-direction:column; align-items:center; }
    .truck-dot {
      width:34px; height:34px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; border:2px solid; transition:transform .15s;
    }
    .truck-label {
      font-family:'IBM Plex Mono',monospace; font-size:9px; font-weight:700;
      padding:1px 5px; border-radius:3px; margin-top:2px;
      white-space:nowrap; letter-spacing:.5px;
      background:rgba(13,17,23,0.85);
    }

    /* API log */
    #api-log-wrap { border-top:1px solid var(--border); flex-shrink:0; }
    #api-log-head { padding:6px 12px; font-family:var(--mono); font-size:.62rem; color:var(--muted); letter-spacing:1px; display:flex; align-items:center; gap:6px; }
    #api-log { height:72px; overflow-y:auto; padding:4px 10px 8px; font-family:var(--mono); font-size:.58rem; color:var(--muted); background:#0a0d10; }
    #api-log::-webkit-scrollbar { width:3px; }
    #api-log::-webkit-scrollbar-thumb { background:var(--border); }
    .log-line { line-height:1.6; }
    .log-ts  { color:var(--green); margin-right:6px; }
    .log-ok  { color:var(--green); }
    .log-err { color:var(--red); }
    .log-info{ color:var(--blue); }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-overlay">
  <span style="font-size:2.5rem">❄️</span>
  <h2>LOADING REAL ROAD ROUTES</h2>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">Fetching routes from OSRM…</div>
</div>

<!-- HEADER -->
<div id="header">
  <span class="logo">❄️</span>
  <div>
    <h1>Snow Fleet Tracker</h1>
    <span class="sub">Toronto, ON · Real Road Routing · OSRM</span>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  <div id="poll-timer">Next update in <span id="countdown">4</span>s</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-head">
    <h2>Fleet Overview</h2>
    <div class="fleet-stats">
      <div class="fstat available"><div class="val" id="cnt-available">0</div><div class="lbl">Available</div></div>
      <div class="fstat busy">    <div class="val" id="cnt-busy">0</div>     <div class="lbl">Busy</div></div>
      <div class="fstat full">    <div class="val" id="cnt-full">0</div>     <div class="lbl">Full</div></div>
    </div>
  </div>
  <div id="truck-list"></div>
  <div id="api-log-wrap">
    <div id="api-log-head">⬡ ROUTE LOG</div>
    <div id="api-log"></div>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  TRUCK DEFINITIONS
//  Each truck has named waypoints on real Toronto streets.
//  OSRM will snap these to roads and return the full road geometry.
// ═══════════════════════════════════════════════════════════════════════════
const TRUCK_DEFS = [

    waypoints:[

  {

    // King St W (west): Roncesvalles → Dufferin

      [-79.43800, 43.63950],
      [-79.42800, 43.63970],

    ]
  },
  {
    id:"TRK-009", color:"#79c0ff", emoji:"🚚",
    // Yonge St: Bloor → Dundas
    waypoints:[
      [-79.38685, 43.67090],
      [-79.38700, 43.66400],
      [-79.38710, 43.65700],
      [-79.38720, 43.65200],
      [-79.38730, 43.64900],
    ]
  },
  {
    id:"TRK-010", color:"#e3b341", emoji:"🚛",
    // Bay St: Bloor → King
    waypoints:[
      [-79.38500, 43.67000],
      [-79.38480, 43.66300],
      [-79.38460, 43.65600],
      [-79.38440, 43.64900],
      [-79.38410, 43.64500],
    ]
  },
];

// ═══════════════════════════════════════════════════════════════════════════
//  OSRM ROUTING  — public OSRM demo server, free, no key needed
//  Fetches real road geometry between waypoints
// ═══════════════════════════════════════════════════════════════════════════
async function fetchOSRMRoute(waypoints) {
  // Build coordinate string:  lon,lat;lon,lat;...
  const coords = waypoints.map(w => `${w[0]},${w[1]}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/driving/${coords}`
            + `?overview=full&geometries=geojson&steps=false`;

  const res  = await fetch(url);
  const data = await res.json();

  if (data.code !== 'Ok' || !data.routes || !data.routes[0]) {
    throw new Error('OSRM returned no route');
  }

  // GeoJSON coords are [lon, lat] — flip to [lat, lon] for Leaflet
  return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAP SETUP
// ═══════════════════════════════════════════════════════════════════════════
const map = L.map('map', { zoomControl:true }).setView([43.6540, -79.3900], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 20,
}).addTo(map);

// ═══════════════════════════════════════════════════════════════════════════
//  TRUCK STATE  — holds the real road path + animation cursor per truck
// ═══════════════════════════════════════════════════════════════════════════
const truckState    = {};  // id → { path:[[lat,lon],...], cursor, speed, status, streetName }
const markers       = {};
const trailLines    = {};
const routeLines    = {};
let   selectedId    = null;

const STATUSES = ['available','available','busy','busy','full'];

function pillClass(s) { return s==='available'?'pill-available':s==='busy'?'pill-busy':'pill-full'; }
function statusColor(s){ return s==='available'?'#3fb950':s==='busy'?'#d29922':'#f85149'; }

// ─── Reverse-geocode street name via Nominatim (best-effort) ─────────────
const streetCache = {};
async function getStreetName(lat, lon) {
  const key = `${lat.toFixed(4)},${lon.toFixed(4)}`;
  if (streetCache[key]) return streetCache[key];
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=17`,
      { headers: { 'Accept-Language': 'en' } });
    const d = await r.json();
    const road = d.address?.road || d.address?.pedestrian || 'Unknown St';
    streetCache[key] = road;
    return road;
  } catch { return 'Unknown St'; }
}

// ─── Build icon ───────────────────────────────────────────────────────────
function makeIcon(def, state) {
  const col = def.color;
  return L.divIcon({
    className: '',
    html: `<div class="truck-marker-wrap">
      <div class="truck-dot" style="background:${col}20;border-color:${col};box-shadow:0 0 14px ${col}60">
        <span style="filter:drop-shadow(0 0 3px ${col})">${def.emoji}</span>
      </div>
      <div class="truck-label" style="color:${col};border:1px solid ${col}55">${def.id}</div>
    </div>`,
    iconSize:   [64, 52],
    iconAnchor: [32, 20],
    popupAnchor:[0, -22],
  });
}

function popupHTML(def, state) {
  const pos = state.path[state.cursor] || state.path[0];
  return `<div class="popup-inner">
    <div class="popup-header">
      <span class="popup-icon">${def.emoji}</span>
      <div>
        <div class="popup-id" style="color:${def.color}">${def.id}</div>
        <span class="status-pill ${pillClass(state.status)}">${state.status}</span>
      </div>
    </div>
    <div class="popup-rows">
      <div class="popup-row"><span class="popup-label">SPEED</span>
        <span class="popup-value spd">${state.speed} km/h</span></div>
      <div class="popup-row"><span class="popup-label">STATUS</span>
        <span class="popup-value">${state.status.toUpperCase()}</span></div>
      <div class="popup-row"><span class="popup-label">STREET</span>
        <span class="popup-value" style="font-size:.62rem;color:var(--muted)">${state.streetName||'…'}</span></div>
      <div class="popup-row"><span class="popup-label">COORDS</span>
        <span class="popup-value" style="font-size:.6rem">${pos[0].toFixed(5)}, ${pos[1].toFixed(5)}</span></div>
    </div>
  </div>`;
}

// ─── Init marker for a truck once its route is loaded ────────────────────
function initTruckMarker(def) {
  const state = truckState[def.id];
  const pos   = state.path[0];

  const m = L.marker(pos, { icon: makeIcon(def, state), zIndexOffset:500 }).addTo(map);
  m.bindPopup(popupHTML(def, state), { maxWidth:240, className:'' });
  m.on('click', () => { selectedId = def.id; highlightCard(def.id); });
  markers[def.id] = m;

  // Faint full-route guide line
  routeLines[def.id] = L.polyline(state.path, {
    color: def.color, weight:2, opacity:.18, dashArray:'4,4'
  }).addTo(map);

  // Bold trail that grows as truck moves
  trailLines[def.id] = L.polyline([pos], {
    color: def.color, weight:3.5, opacity:.75
  }).addTo(map);
}

// ═══════════════════════════════════════════════════════════════════════════
//  ANIMATION LOOP  — one setInterval per truck, independent speed
// ═══════════════════════════════════════════════════════════════════════════
function startTruckAnimation(def) {
  const state = truckState[def.id];

  // Slow cleaning pace — each truck ticks every 600–900ms (like 10–15 km/h)
  const tickMs = 600 + Math.random() * 300;

  setInterval(() => {
    if (!state.path.length) return;

    // Advance cursor
    state.cursor = (state.cursor + 1) % state.path.length;
    const pos = state.path[state.cursor];

    // Update marker position
    markers[def.id].setLatLng(pos);
    markers[def.id].setIcon(makeIcon(def, state));
    if (markers[def.id].isPopupOpen()) {
      markers[def.id].setPopupContent(popupHTML(def, state));
    }

    // Grow trail, trim to last 80 pts
    const tll = trailLines[def.id].getLatLngs();
    tll.push(pos);
    if (tll.length > 80) tll.shift();
    trailLines[def.id].setLatLngs(tll);

    // Vary speed slightly — cleaning pace 8–18 km/h
    state.speed = Math.max(8, Math.min(18, state.speed + (Math.random()-.5)*2));

    // Update street name every ~20 steps (async, non-blocking)
    if (state.cursor % 20 === 0) {
      getStreetName(pos[0], pos[1]).then(name => { state.streetName = name; });
    }

  }, tickMs);
}

// ═══════════════════════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════
function highlightCard(id) {
  document.querySelectorAll('.truck-card').forEach(c => c.classList.remove('active'));
  const el = document.getElementById('card-'+id);
  if (el) el.classList.add('active');
}

function updateSidebar() {
  let avail=0, busy=0, full=0;
  TRUCK_DEFS.forEach(def => {
    const s = truckState[def.id];
    if (!s) return;
    if (s.status==='available') avail++;
    else if (s.status==='busy') busy++;
    else full++;

    const pos = s.path[s.cursor] || s.path[0] || [0,0];
    let card = document.getElementById('card-'+def.id);
    if (!card) {
      card = document.createElement('div');
      card.className = 'truck-card';
      card.id = 'card-'+def.id;
      document.getElementById('truck-list').appendChild(card);
    }
    if (selectedId===def.id) card.classList.add('active');
    card.innerHTML = `
      <div class="truck-avatar" style="background:${def.color}22;border:1.5px solid ${def.color}66">${def.emoji}</div>
      <div class="truck-info">
        <div class="truck-id" style="color:${def.color}">${def.id}</div>
        <div class="truck-street">${s.streetName||'Loading…'}</div>
      </div>
      <div class="truck-right">
        <div class="speed-val">${Math.round(s.speed)}<span class="speed-unit"> km/h</span></div>
        <div class="status-pill ${pillClass(s.status)}">${s.status}</div>
      </div>`;
    card.onclick = () => {
      selectedId = def.id;
      highlightCard(def.id);
      map.setView(pos, 16, { animate:true });
      markers[def.id]?.openPopup();
    };
  });
  document.getElementById('cnt-available').textContent = avail;
  document.getElementById('cnt-busy').textContent      = busy;
  document.getElementById('cnt-full').textContent      = full;
}

// ═══════════════════════════════════════════════════════════════════════════
//  LOG
// ═══════════════════════════════════════════════════════════════════════════
function log(msg, cls='log-ok') {
  const el   = document.getElementById('api-log');
  const now  = new Date().toLocaleTimeString('en-CA',{hour12:false});
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-ts">[${now}]</span><span class="${cls}">${msg}</span>`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 80) el.removeChild(el.firstChild);
}

// ═══════════════════════════════════════════════════════════════════════════
//  BOOT  — fetch all OSRM routes on load, then start animations
// ═══════════════════════════════════════════════════════════════════════════
async function boot() {
  const total  = TRUCK_DEFS.length;
  let   loaded = 0;

  const setProgress = (n, msg) => {
    document.getElementById('loading-bar').style.width = (n/total*100)+'%';
    document.getElementById('loading-status').textContent = msg;
  };

  log('Fetching real road routes via OSRM…', 'log-info');

  // Fetch all routes in parallel
  await Promise.all(TRUCK_DEFS.map(async def => {
    try {
      const path = await fetchOSRMRoute(def.waypoints);
      truckState[def.id] = {
        path,
        cursor:     Math.floor(Math.random() * path.length),  // stagger start
        speed:      Math.round(8 + Math.random()*10),
        status:     STATUSES[Math.floor(Math.random()*STATUSES.length)],
        streetName: 'Loading…',
      };
      // Seed street name for initial position
      const pos = path[truckState[def.id].cursor];
      getStreetName(pos[0], pos[1]).then(n => { truckState[def.id].streetName = n; });

      loaded++;
      setProgress(loaded, `Loaded ${def.id} — ${path.length} road points`);
      log(`✓ ${def.id} · ${path.length} waypoints via OSRM`);
    } catch(e) {
      // Fallback: use raw waypoints if OSRM fails
      const path = def.waypoints.map(w => [w[1], w[0]]);
      truckState[def.id] = {
        path, cursor:0,
        speed:25, status:'available', streetName:'Offline mode'
      };
      loaded++;
      setProgress(loaded, `${def.id} used fallback (OSRM unavailable)`);
      log(`⚠ ${def.id} · OSRM failed, using fallback`, 'log-err');
    }
  }));

  // Init all markers
  TRUCK_DEFS.forEach(def => initTruckMarker(def));

  // Start independent animation loops
  TRUCK_DEFS.forEach(def => startTruckAnimation(def));

  // Sidebar refresh loop
  setInterval(updateSidebar, 500);
  updateSidebar();

  // Countdown display
  let cd = 4;
  setInterval(() => {
    cd = cd <= 0 ? 4 : cd - 1;
    document.getElementById('countdown').textContent = cd;
  }, 1000);

  // Hide loading screen
  document.getElementById('loading-overlay').style.display = 'none';
  log(`🚛 All 10 trucks on real roads. Ready!`, 'log-info');
}

boot();
</script>
